name: CodeQL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Weekly on Monday at 4 AM UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'swift' && 'macos-latest' || matrix.language == 'csharp' && 'windows-latest' || 'ubuntu-latest' }}
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [actions, swift, python, javascript-typescript, csharp]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build Windows solution
        if: matrix.language == 'csharp'
        shell: pwsh
        run: ./windows/scripts/build-windows.ps1 -Configuration Debug

      - name: Build macOS app
        if: matrix.language == 'swift'
        shell: bash
        run: |
          xcodebuild \
            -quiet \
            -project BugNarrator.xcodeproj \
            -scheme BugNarrator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Autobuild
        if: matrix.language != 'csharp' && matrix.language != 'swift'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
