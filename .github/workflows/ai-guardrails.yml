name: AI Guardrails

# Runs on every PR targeting main.
# Do NOT add macos-latest jobs — macOS runners consume significantly
# more runner credits. Native builds should use separate workflow_dispatch
# or release-only triggers.
# See developer/coding-standards.md "CI Design Rules" for the full policy.

on:
  pull_request:
    branches: [main]

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Enforce runtime guardrails
        run: |
          node tools/validators/enforce-runtime-guardrails.js \
            --repo . \
            --config ai.config.json \
            --base "${{ github.event.pull_request.base.sha }}"
