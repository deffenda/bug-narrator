name: CI

on:
  push:
    branches:
      - main
      - "phase/**"
      - "codex/**"
  pull_request:

jobs:
  macos-validation:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run release smoke test
        run: ./scripts/release_smoke_test.sh

      - name: Run accessibility regression check
        run: ./scripts/accessibility_regression_check.sh

  docs-site-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install docs site dependencies
        run: npm ci --prefix site

      - name: Build docs site
        run: npm run build --prefix site

  windows-workspace-validation:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Windows solution
        shell: pwsh
        run: ./windows/scripts/build-windows.ps1 -Configuration Debug

      - name: Run Windows tests
        shell: pwsh
        run: ./windows/scripts/test-windows.ps1 -Configuration Debug -NoBuild

      - name: Package Windows workspace artifact
        shell: pwsh
        run: ./windows/scripts/package-windows.ps1 -Configuration Release

      - name: Validate Windows package artifact
        shell: pwsh
        run: ./windows/scripts/validate-windows-package.ps1 -Runtime win-x64

      - name: Upload Windows validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: bugnarrator-windows-validation
          if-no-files-found: error
          path: |
            windows/artifacts/validation/BugNarrator-windows-win-x64-validation.json
            windows/artifacts/publish/win-x64/bugnarrator-smoke-report.json

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugnarrator-windows-package
          path: windows/artifacts/packages/BugNarrator-windows-win-x64.zip
