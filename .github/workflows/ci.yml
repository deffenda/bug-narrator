name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  runtime-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run runtime guardrails validator
        run: ./scripts/validate.sh "${{ steps.base.outputs.ref }}"

  docs-site-validation:
    needs: runtime-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install docs site dependencies
        run: npm ci --prefix site

      - name: Build docs site
        run: npm run build --prefix site

  windows-workspace-validation:
    needs: runtime-guardrails
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build Windows solution
        shell: pwsh
        run: ./windows/scripts/build-windows.ps1 -Configuration Debug

      - name: Run Windows tests
        shell: pwsh
        run: ./windows/scripts/test-windows.ps1 -Configuration Debug -NoBuild

      - name: Package Windows workspace artifact
        shell: pwsh
        run: ./windows/scripts/package-windows.ps1 -Configuration Release

      - name: Validate Windows package artifact
        shell: pwsh
        run: ./windows/scripts/validate-windows-package.ps1 -Runtime win-x64

      - name: Generate Windows Codex handoff report
        shell: pwsh
        run: ./windows/scripts/invoke-windows-codex-handoff.ps1

      - name: Upload Windows validation evidence
        uses: actions/upload-artifact@v6
        with:
          name: bugnarrator-windows-validation
          if-no-files-found: error
          path: |
            windows/artifacts/validation/BugNarrator-windows-win-x64-validation.json
            windows/artifacts/publish/win-x64/bugnarrator-smoke-report.json

      - name: Upload Windows Codex handoff artifact
        uses: actions/upload-artifact@v6
        with:
          name: bugnarrator-windows-handoff
          if-no-files-found: error
          path: windows/artifacts/handoff/windows-codex-handoff.json

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v6
        with:
          name: bugnarrator-windows-package
          path: windows/artifacts/packages/BugNarrator-windows-win-x64.zip
