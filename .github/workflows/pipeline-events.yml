name: Pipeline Event Triggers

# Event-driven triggers that replace or supplement Codex polling.
# These workflows dispatch repository_dispatch events that Codex
# automations or external listeners can consume, reducing the
# latency from ~15 minutes (polling) to seconds (event-driven).
#
# Product repos should customize the dispatch targets to match
# their Codex automation webhook endpoints or GitHub App listeners.

on:
  pull_request:
    types: [closed]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: read
  checks: read

jobs:
  on-pr-merged:
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Read controller state
        id: controller
        shell: bash
        run: |
          if [ -f state/controller.md ]; then
            STATE=$(grep -E '^(current_state|state|status):' state/controller.md | head -n 1 | sed -E 's/^(current_state|state|status):[[:space:]]*//' || echo "unknown")
            echo "state=$STATE" >> "$GITHUB_OUTPUT"
          else
            echo "state=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch post-merge event
        if: steps.controller.outputs.state == 'ready_for_review'
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: pipeline-pr-merged
          client-payload: >-
            {
              "pr_number": "${{ github.event.pull_request.number }}",
              "pr_title": "${{ github.event.pull_request.title }}",
              "merge_sha": "${{ github.event.pull_request.merge_commit_sha }}",
              "controller_state": "${{ steps.controller.outputs.state }}"
            }

  on-ci-failed:
    if: >-
      github.event_name == 'check_suite'
      && github.event.check_suite.conclusion == 'failure'
      && github.event.check_suite.head_branch != github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.check_suite.head_branch }}
          fetch-depth: 1

      - name: Read controller state
        id: controller
        shell: bash
        run: |
          if [ -f state/controller.md ]; then
            STATE=$(grep -E '^(current_state|state|status):' state/controller.md | head -n 1 | sed -E 's/^(current_state|state|status):[[:space:]]*//' || echo "unknown")
            echo "state=$STATE" >> "$GITHUB_OUTPUT"
          else
            echo "state=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch CI failure event
        if: >-
          steps.controller.outputs.state == 'ready_for_review'
          || steps.controller.outputs.state == 'review_failed_fix_required'
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: pipeline-ci-failed
          client-payload: >-
            {
              "branch": "${{ github.event.check_suite.head_branch }}",
              "conclusion": "${{ github.event.check_suite.conclusion }}",
              "controller_state": "${{ steps.controller.outputs.state }}"
            }
